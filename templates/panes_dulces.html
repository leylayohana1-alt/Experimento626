<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panes y Dulces - Dulce Edén</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #fff5f5;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: #4a3b32;
        }
        .category-container {
            max-width: 1200px;
            margin: 40px auto 60px auto;
            padding: 0 20px;
        }
        .category-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .category-header h1 {
            font-size: 2.8rem;
            color: #5c3d2e;
            margin: 0;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 25px rgba(211, 158, 130, 0.2);
        }
        .product-image-wrapper {
            width: 100%;
            height: 240px;
            overflow: hidden;
        }
        .product-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .product-card:hover img {
            transform: scale(1.05);
        }
        .product-info {
            padding: 25px 20px;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #4a3b32;
            margin: 0 0 8px 0;
        }
        .product-price {
            font-size: 1.2rem;
            font-weight: 600;
            color: #d39e82;
            margin: 0 0 20px 0;
        }
        .btn-add-cart {
            background-color: #5c3d2e;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-add-cart:hover {
            background-color: #d39e82;
        }
        .btn-add-cart:active {
            transform: scale(0.97);
        }
        .btn-back {
            display: inline-block;
            margin-top: 40px;
            color: #634832;
            text-decoration: none;
            font-weight: 500;
        }
        .btn-back:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="category-container">
        <div class="category-header">
            <h1>🥐 Panes y Dulces</h1>
        </div>

        <div class="products-grid">
            {% for producto in productos %}
            <div class="product-card">
                <div class="product-image-wrapper">
                    <img src="{{ producto.imagen }}" alt="{{ producto.nombre }}">
                </div>
                <div class="product-info">
                    <div>
                        <h3 class="product-name">{{ producto.nombre }}</h3>
                        <p class="product-price">S/. {{ producto.precio }}</p>
                    </div>
                    <a href="/agregar?nombre={{ producto.nombre }}&precio={{ producto.precio }}" class="btn-add-cart">
                        Añadir al Carrito
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>

        <div style="text-align: center;">
            <a href="/menu" class="btn-back">⬅ Volver al Menú</a>
        </div>
    </div>

</body>
</html>
